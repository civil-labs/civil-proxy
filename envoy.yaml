# ==============================================================================
# MASTER ENVOY.YAML TEMPLATE
# Architecture: civil-gateway, tile-server, idp, ldap, db-reader, db-writer
# Differentiated Ports (0.0.0.0), Multiplexed IDP Listener
# Service Discovery: AWS Cloud Map (namespace: civil.local)
# ==============================================================================

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    # --------------------------------------------------------------------------
    # 1. CIVIL-GATEWAY SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_gateway_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8081 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_gateway_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: civil_gateway_egress
      address:
        socket_address: { address: 127.0.0.1, port_value: 8082 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress_mesh
                route_config:
                  name: mesh_routing
                  virtual_hosts:
                    - name: route_to_tile
                      domains: ["tile-server*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_tile_server_http }
                    - name: route_to_idp
                      domains: ["idp*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_idp }
                    - name: route_to_db_reader
                      domains: ["database-reader*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_db_reader_grpc }
                    - name: route_to_db_writer
                      domains: ["database-writer*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_db_writer_grpc }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      # Optional: Format as JSON for easy parsing in AWS CloudWatch / Datadog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          upstream_host: "%UPSTREAM_HOST%"
                          duration_ms: "%DURATION%"

    # --------------------------------------------------------------------------
    # 2. CIVIL-TILE-SERVER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_tile_server_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8083 }
      filter_chains:
        - filters:
            # The HTTP Connection Manager is the single Network Filter
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: tile_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: 
                            cluster: local_tile_server_app
                            host_rewrite_header: "x-forwarded-host"  
                          request_headers_to_add:
                            - header:
                                key: "x-forwarded-prefix"
                                value: "/tiles"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "x-forwarded-host"
                                value: "%REQ(X-FORWARDED-HOST)%"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: "x-forwarded-proto"
                                value: "%REQ(X-FORWARDED-PROTO)%"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                
                # The Cache Filter must live INSIDE the Connection Manager
                http_filters:
                  - name: envoy.filters.http.cache
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
                      typed_config:
                        # The corrected v3 API type URL
                        "@type": type.googleapis.com/envoy.extensions.http.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                  
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 3. CIVIL-IDP SIDECAR 
    # --------------------------------------------------------------------------

    # Multiplexed Ingress: Handles both HTTP (.well-known) and HTTP/2 (gRPC) on 8082
    - name: civil_idp_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8084 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: idp_ingress
                http2_protocol_options: {} # Enables HTTP/2 multiplexing for gRPC
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      # Differentiate by content-type header
                      routes:
                      # gRPC traffic
                        - match: 
                            prefix: "/"
                            headers:
                              - name: "content-type"
                                string_match:
                                  prefix: "application/grpc"
                          route: 
                            cluster: local_idp_app_grpc
                        - match: 
                            prefix: "/"
                          route: 
                            cluster: local_idp_app_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      # Optional: Format as JSON for easy parsing in AWS CloudWatch / Datadog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          upstream_host: "%UPSTREAM_HOST%"
                          duration_ms: "%DURATION%"

    - name: civil_idp_ldap_egress
      address:
        socket_address: { address: 127.0.0.1, port_value: 8085 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: egress_ldap_tcp
                cluster: mesh_ldap_server_tcp

    # --------------------------------------------------------------------------
    # 4. CIVIL-LDAP-SERVER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_ldap_tcp_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8086 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: ldap_tcp_ingress
                cluster: local_ldap_app_tcp

    - name: civil_ldap_http_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8087 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ldap_http_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_ldap_app_http }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 5. CIVIL-DATABASE-READER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_db_reader_grpc_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8088 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: db_reader_ingress
                http2_protocol_options: {}
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_db_reader_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 6. CIVIL-DATABASE-WRITER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_db_writer_grpc_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8089 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: db_writer_ingress
                http2_protocol_options: {}
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_db_writer_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ==========================================================================
    # LOCAL APP CLUSTERS (Traffic flowing from Sidecar -> Local Container)
    # Applications are now using their standard, native listening ports.
    # ==========================================================================
    - name: local_gateway_app
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_gateway_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 8080 } } }

    - name: local_tile_server_app
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_tile_server_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 8080 } } }

    - name: local_idp_app_http
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_idp_app_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 8080 } } } # Native HTTP

    - name: local_idp_app_grpc
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_idp_app_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 50051 } } } # Standard gRPC port

    - name: local_ldap_app_tcp
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_ldap_app_tcp
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 389 } } } # Native LDAP port

    - name: local_ldap_app_http
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_ldap_app_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 8080 } } }

    - name: local_db_reader_app
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_db_reader_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 50051 } } } # Standard gRPC port

    - name: local_db_writer_app
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_db_writer_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 50051 } } } # Standard gRPC port

    # ==========================================================================
    # MESH REMOTE CLUSTERS (Traffic flowing from Sidecar -> Mesh Network)
    # Target ports updated to match the individual remote ingress ports.
    # ==========================================================================
    
    - name: mesh_tile_server_http
      connect_timeout: 0.25s
      type: STRICT_DNS
      load_assignment:
        cluster_name: mesh_tile_server_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: tile-server.civil.local, port_value: 8083 } } }

    - name: mesh_idp
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {} 
      load_assignment:
        cluster_name: mesh_idp
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: idp.civil.local, port_value: 8084 } } }

    - name: mesh_ldap_server_tcp
      connect_timeout: 0.25s
      type: STRICT_DNS
      load_assignment:
        cluster_name: mesh_ldap_server_tcp
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: ldap-server.civil.local, port_value: 8086 } } }

    - name: mesh_db_reader_grpc
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {}
      load_assignment:
        cluster_name: mesh_db_reader_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: database-reader.civil.local, port_value: 8088 } } }

    - name: mesh_db_writer_grpc
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {}
      load_assignment:
        cluster_name: mesh_db_writer_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: database-writer.civil.local, port_value: 8089 } } }