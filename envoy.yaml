# ==============================================================================
# MASTER ENVOY.YAML TEMPLATE
# Architecture: civil-gateway, tile-server, idp, ldap, db-reader, db-writer
# Service Discovery: AWS Cloud Map (namespace: civil.local)
# ==============================================================================

static_resources:
  listeners:
    # --------------------------------------------------------------------------
    # 1. CIVIL-GATEWAY SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_gateway_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_gateway_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: civil_gateway_egress
      address:
        socket_address: { address: 127.0.0.1, port_value: 8000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress_mesh
                route_config:
                  name: mesh_routing
                  virtual_hosts:
                    - name: route_to_tile
                      domains: ["civil-tile-server*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_tile_server_http }
                    - name: route_to_idp
                      domains: ["civil-idp*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_idp_grpc }
                    - name: route_to_db_reader
                      domains: ["civil-database-reader*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_db_reader_grpc }
                    - name: route_to_db_writer
                      domains: ["civil-database-writer*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mesh_db_writer_grpc }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 2. CIVIL-TILE-SERVER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_tile_server_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8081 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: tile_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_tile_server_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 3. CIVIL-IDP SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_idp_http_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8082 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: idp_http_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/.well-known/" }
                          route: { cluster: local_idp_app_http }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: civil_idp_grpc_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8083 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: idp_grpc_ingress
                http2_protocol_options: {}
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_idp_app_grpc }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: civil_idp_ldap_egress
      address:
        socket_address: { address: 127.0.0.1, port_value: 8084 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: egress_ldap_tcp
                cluster: mesh_ldap_server_tcp

    # --------------------------------------------------------------------------
    # 4. CIVIL-LDAP-SERVER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_ldap_tcp_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8085 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: ldap_tcp_ingress
                cluster: local_ldap_app_tcp

    - name: civil_ldap_http_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8086 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ldap_http_ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_ldap_app_http }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 5. CIVIL-DATABASE-READER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_db_reader_grpc_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8087 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: db_reader_ingress
                http2_protocol_options: {}
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_db_reader_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # --------------------------------------------------------------------------
    # 6. CIVIL-DATABASE-WRITER SIDECAR
    # --------------------------------------------------------------------------
    - name: civil_db_writer_grpc_ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8088 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: db_writer_ingress
                http2_protocol_options: {}
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_db_writer_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ==========================================================================
    # LOCAL APP CLUSTERS (Traffic flowing from Sidecar -> Local Container)
    # ==========================================================================
    - name: local_gateway_app
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_gateway_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9080 } } }

    - name: local_tile_server_app
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_tile_server_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9081 } } }

    - name: local_idp_app_http
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_idp_app_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9082 } } }

    - name: local_idp_app_grpc
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_idp_app_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9083 } } }

    - name: local_ldap_app_tcp
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_ldap_app_tcp
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9085 } } }

    - name: local_ldap_app_http
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: local_ldap_app_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9086 } } }

    - name: local_db_reader_app
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_db_reader_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9087 } } }

    - name: local_db_writer_app
      connect_timeout: 0.25s
      type: STATIC
      http2_protocol_options: {}
      load_assignment:
        cluster_name: local_db_writer_app
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: 127.0.0.1, port_value: 9088 } } }

    # ==========================================================================
    # MESH REMOTE CLUSTERS (Traffic flowing from Sidecar -> Mesh Network)
    # AWS Cloud Map Endpoints (*.civil.local)
    # ==========================================================================
    - name: mesh_tile_server_http
      connect_timeout: 0.25s
      type: STRICT_DNS
      load_assignment:
        cluster_name: mesh_tile_server_http
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: civil-tile-server.civil.local, port_value: 8081 } } }

    - name: mesh_idp_grpc
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {} 
      load_assignment:
        cluster_name: mesh_idp_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: civil-idp.civil.local, port_value: 8083 } } }

    - name: mesh_ldap_server_tcp
      connect_timeout: 0.25s
      type: STRICT_DNS
      load_assignment:
        cluster_name: mesh_ldap_server_tcp
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: civil-ldap-server.civil.local, port_value: 8085 } } }

    - name: mesh_db_reader_grpc
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {}
      load_assignment:
        cluster_name: mesh_db_reader_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: civil-database-reader.civil.local, port_value: 8087 } } }

    - name: mesh_db_writer_grpc
      connect_timeout: 0.25s
      type: STRICT_DNS
      http2_protocol_options: {}
      load_assignment:
        cluster_name: mesh_db_writer_grpc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: civil-database-writer.civil.local, port_value: 8088 } } }